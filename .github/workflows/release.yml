name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v1.0.0)"
        required: true

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  packages: write

jobs:
  # ── Run full CI before building release ───────────────────────────────
  ci:
    name: CI Checks
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Validate Gradle Wrapper
        uses: gradle/wrapper-validation-action@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-encryption-key: ${{ secrets.GRADLE_ENCRYPTED_KEY }}

      - name: Grant Execute Permission for Gradlew
        run: chmod +x gradlew

      - name: Install ktlint
        run: |
          curl -sSLO https://github.com/pinterest/ktlint/releases/download/1.2.1/ktlint
          chmod +x ktlint
          sudo mv ktlint /usr/local/bin/

      - name: ktlintCheck
        run: ./gradlew ktlintCheck

      - name: lintDebug
        run: ./gradlew lintDebug

      - name: test
        run: ./gradlew test

  # ── Build release APK ─────────────────────────────────────────────────
  build-release:
    name: Build Release APK
    needs: ci
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Validate Gradle Wrapper
        uses: gradle/wrapper-validation-action@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-encryption-key: ${{ secrets.GRADLE_ENCRYPTED_KEY }}

      - name: Grant Execute Permission for Gradlew
        run: chmod +x gradlew

      - name: Determine version
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          # Strip leading 'v' for versionName
          VERSION="${TAG#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          # versionCode: strip dots from version, pad to keep sortable
          CODE=$(echo "$VERSION" | tr -d '.' | sed 's/^0*//')
          [ -z "$CODE" ] && CODE=0
          echo "code=$CODE" >> "$GITHUB_OUTPUT"
          echo "Release: tag=$TAG version=$VERSION code=$CODE"

      - name: Build Release APK
        env:
          VERSION_NAME: ${{ steps.version.outputs.version }}
          VERSION_CODE: ${{ steps.version.outputs.code }}
        run: |
          ./gradlew assembleRelease \
            -PversionName="$VERSION_NAME" \
            -PversionCode="$VERSION_CODE"

      - name: Rename APK
        run: |
          mkdir -p release
          cp app/build/outputs/apk/release/app-release.apk \
            release/hermes-control-${{ steps.version.outputs.tag }}.apk
          ls -lh release/

      - name: Upload Release APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: hermes-control-release
          path: release/*.apk
          retention-days: 90

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Hermes Control ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          files: release/*.apk
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

# Modified from Hy4ri/hermes-mobile for this fork; see NOTICE.

name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (for example, v1.2.3)"
        required: true

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  ci:
    name: CI Checks
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up JDK 21
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6
        with:
          validate-wrappers: true
          cache-encryption-key: ${{ secrets.GRADLE_ENCRYPTED_KEY }}

      - name: Grant execute permission for Gradle wrapper
        run: chmod 0755 gradlew

      - name: Cache ktlint
        id: cache-ktlint
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: ~/.local/bin/ktlint
          key: ktlint-1.2.1

      - name: Install ktlint
        if: steps.cache-ktlint.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/.local/bin
          curl -fsSL \
            https://github.com/pinterest/ktlint/releases/download/1.2.1/ktlint \
            -o ~/.local/bin/ktlint
          chmod 0755 ~/.local/bin/ktlint

      - name: Verify ktlint checksum
        run: |
          echo "2e28cf46c27d38076bf63beeba0bdef6a845688d6c5dccd26505ce876094eb92  $HOME/.local/bin/ktlint" |
            sha256sum -c -

      - name: Add local bin to PATH
        run: echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Run validation
        run: |
          ./gradlew ktlintCheck
          ./gradlew lintHermesDebug lintIrisDebug
          ./gradlew test
          ./gradlew assembleHermesDebug assembleIrisDebug

  build-release:
    name: Build signed Hermes Mobile APK
    needs: ci
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    outputs:
      release_tag: ${{ steps.version.outputs.tag }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up JDK 21
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6
        with:
          validate-wrappers: true
          cache-encryption-key: ${{ secrets.GRADLE_ENCRYPTED_KEY }}

      - name: Grant execute permission for Gradle wrapper
        run: chmod 0755 gradlew

      - name: Determine version
        id: version
        env:
          DISPATCH_TAG: ${{ github.event.inputs.tag }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG=$DISPATCH_TAG
          else
            TAG=${GITHUB_REF#refs/tags/}
          fi
          if ! printf '%s\n' "$TAG" |
            grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "Unsupported release tag: $TAG" >&2
            exit 1
          fi
          VERSION=${TAG#v}
          IFS=. read -r MAJOR MINOR PATCH <<EOF
          $VERSION
          EOF
          if [ "$MINOR" -gt 999 ] || [ "$PATCH" -gt 999 ]; then
            echo "Minor and patch versions must be at most 999" >&2
            exit 1
          fi
          CODE=$((MAJOR * 1000000 + MINOR * 1000 + PATCH))
          if [ "$CODE" -le 0 ] || [ "$CODE" -gt 2147483647 ]; then
            echo "Calculated Android version code is out of range" >&2
            exit 1
          fi
          {
            echo "tag=$TAG"
            echo "version=$VERSION"
            echo "code=$CODE"
          } >> "$GITHUB_OUTPUT"
          echo "Release version=$VERSION code=$CODE"

      - name: Decode release keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          umask 077
          printf '%s' "$KEYSTORE_BASE64" |
            base64 -d > "$RUNNER_TEMP/hermes-mobile-release.keystore"

      - name: Build signed Hermes release APK
        env:
          KEYSTORE_PATH: ${{ runner.temp }}/hermes-mobile-release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          ./gradlew assembleHermesRelease \
            -PversionName="${{ steps.version.outputs.version }}" \
            -PversionCode="${{ steps.version.outputs.code }}"

      - name: Verify and package APK
        env:
          RELEASE_TAG: ${{ steps.version.outputs.tag }}
        run: |
          set -eu
          mkdir -p release
          APK=app/build/outputs/apk/hermes/release/app-hermes-release.apk
          OUT=release/hermes-mobile-$RELEASE_TAG.apk
          cp "$APK" "$OUT"
          APKSIGNER="$ANDROID_HOME/build-tools/36.0.0/apksigner"
          if [ ! -x "$APKSIGNER" ]; then
            echo "Android Build-Tools 36.0.0 apksigner is unavailable" >&2
            exit 1
          fi
          "$APKSIGNER" verify --verbose --print-certs "$OUT" |
            tee release/apksigner-verification.txt
          sha256sum "$OUT" > "$OUT.sha256"
          cp LICENSE NOTICE SIGNING.md release/
          cp signing/hermes-mobile-release-certificate.pem release/
          {
            echo "versionName=${{ steps.version.outputs.version }}"
            echo "versionCode=${{ steps.version.outputs.code }}"
            echo "commit=${{ github.sha }}"
          } > release/provenance.txt

      - name: Upload release artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: hermes-mobile-release
          path: release/
          if-no-files-found: error
          retention-days: 90

      - name: Remove temporary keystore
        if: always()
        run: rm -f "$RUNNER_TEMP/hermes-mobile-release.keystore"

  publish:
    name: Create draft GitHub release
    needs: build-release
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - name: Download verified release artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: hermes-mobile-release
          path: release

      - name: Create draft GitHub release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3
        with:
          tag_name: ${{ needs.build-release.outputs.release_tag }}
          name: Hermes Mobile ${{ needs.build-release.outputs.release_tag }}
          generate_release_notes: true
          draft: true
          files: |
            release/hermes-mobile-${{ needs.build-release.outputs.release_tag }}.apk
            release/hermes-mobile-${{ needs.build-release.outputs.release_tag }}.apk.sha256
            release/apksigner-verification.txt
            release/provenance.txt
            release/LICENSE
            release/NOTICE
            release/SIGNING.md
            release/hermes-mobile-release-certificate.pem
